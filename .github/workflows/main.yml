name: NEI CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ALLOWED_HOST: ${{ secrets.ALLOWED_HOST }}
      GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
      GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Docker Compose Action
        uses: isbang/compose-action@v1.5.1
        with:
          compose-file: docker-compose.prod.yml

      #- name: Add Roles
      #  run: docker-compose exec -T django python manage.py add_roles

      #- name: Add Static Data
      #  run: docker-compose exec -T django python manage.py add_from_json
        
      - name: Run Django Tests
        run: docker-compose exec -T django python manage.py test

      - name: ZAP API Scan
        # You may pin to the exact commit or the version.
        # uses: zaproxy/action-api-scan@411cbe8fc59d9966a77d61b50daf6c49b6763605
        uses: zaproxy/action-api-scan@v0.6.0
        with:
          #token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          format: openapi
          target: 'http://127.0.0.1/api/openapi/'
          cmd_options: '-a'
          #issue_title: 'ZAP Vulnerability Found'
          #rules_file_name: '.zap/rules.tsv'
          
      # - name: ZAP Full Scan
      #   uses: zaproxy/action-full-scan@v0.9.0
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     target: http://127.0.0.1/
      #     docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
      #     cmd_options: '-a'
      #     fail_action: false
          
      - name: Clean up
        run: docker-compose down --remove-orphans --volumes
